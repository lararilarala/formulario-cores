<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Em breve</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400&display=swap');
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:#ffffff;
  font-family:'DM Mono', monospace;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:40px 20px;
}
.stripe {
  position:fixed;
  top:0; left:0; right:0;
  height:4px;
  background:linear-gradient(90deg,#D30B8F,#8AC6E6,#7B0479,#B85C38,#E93D3E,#9D673E,#536DBC,#E056A2,#FEC101,#1A0A2E,#00897B,#FF6B35,#B388FF,#263859,#C62828,#80CBC4,#4A148C,#F8BBD0,#A7F06C,#EF0A80,#E9FF70,#FF9EF5,#AACC00,#00F5D4,#3AC1FF,#C0392B,#DDA15E,#A0522D,#4E342E,#FF6B6B,#1565C0,#F5E642);
}
.content {
  text-align:center;
  max-width:480px;
}
.label {
  font-size:0.58rem;
  letter-spacing:0.25em;
  text-transform:uppercase;
  color:#ccc;
  margin-bottom:28px;
}
h1 {
  font-family:'DM Serif Display', serif;
  font-size:clamp(2.4rem,6vw,3.6rem);
  line-height:1.1;
  letter-spacing:-0.02em;
  color:#111;
  margin-bottom:24px;
}
h1 em { font-style:italic; opacity:0.35; }
.msg {
  font-size:0.78rem;
  color:#888;
  line-height:1.8;
  margin-bottom:40px;
}
.time {
  display:inline-flex;
  align-items:center;
  gap:10px;
  background:#f5f5f5;
  border:1px solid #e8e8e8;
  border-radius:100px;
  padding:10px 22px;
  font-size:0.65rem;
  letter-spacing:0.12em;
  text-transform:uppercase;
  color:#555;
}
.dot {
  width:7px; height:7px;
  border-radius:50%;
  background:#FEC101;
  animation:pulse 2s ease-in-out infinite;
}
@keyframes pulse {
  0%,100% { opacity:1; transform:scale(1); }
  50% { opacity:0.4; transform:scale(0.7); }
}
.bottom {
  position:fixed;
  bottom:28px;
  font-size:0.52rem;
  letter-spacing:0.15em;
  text-transform:uppercase;
  color:#ddd;
}
</style>
</head>
<body>
<div class="stripe"></div>

<div class="content">
  <p class="label">Formulário de seleção</p>
  <h1>Em<br><em>ajuste</em></h1>
  <p class="msg">
    formulário em arrumação
  
  </p>
  <div class="time">
    <div class="dot"></div>
    Volte amanhã cedo
  </div>
</div>

<p class="bottom">em breve · 32 cores · 22 vozes</p>
</body>
</html>
